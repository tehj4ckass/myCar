version: '3.8'

services:
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: id3_mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    environment:
      - MQTT_USER=${MQTT_USER}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
    entrypoint: /mosquitto/config/docker-entrypoint.sh
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto/docker-entrypoint.sh:/mosquitto/config/docker-entrypoint.sh
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log

  eudata:
    build: ./eudata
    container_name: id3_eudata
    restart: unless-stopped
    depends_on:
      - mosquitto
    environment:
      - TZ=Europe/Vienna
      - VW_USERNAME=${VW_USERNAME}
      - VW_PASSWORD=${VW_PASSWORD}
      - MQTT_USER=${MQTT_USER}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - POLL_INTERVAL_SECONDS=900
      - ABRP_TOKEN=${ABRP_TOKEN}

  vwcarnet:
    build: ./vwcarnet
    container_name: id3_vwcarnet
    restart: "no"   # disabled: VW blocked hybrid flow ~June 10 2026; re-enable when library has a fix
    depends_on:
      - mosquitto
    environment:
      - TZ=Europe/Vienna
      - VW_USERNAME=${VW_USERNAME}
      - VW_PASSWORD=${VW_PASSWORD}
      - MQTT_USER=${MQTT_USER}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - ABRP_TOKEN=${ABRP_TOKEN}
      - POLL_INTERVAL_SECONDS=300

  sqlite_catcher:
    build: ./catcher
    container_name: id3_sqlite_catcher
    restart: unless-stopped
    depends_on:
      - mosquitto
    environment:
      - MQTT_USER=${MQTT_USER}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
    volumes:
      - ./database:/data

  dashboard:
    build: ./dashboard
    container_name: id3_dashboard
    restart: unless-stopped
    ports:
      - "8502:8501"
    environment:
      - VIN=${VIN}
    volumes:
      - ./database:/data:ro
      - ./dashboard:/app
